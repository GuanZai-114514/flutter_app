name: hi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # 連結
  url_launcher: ^6.2.5

  # 條碼
  barcode: ^2.2.5
  barcode_widget: ^2.0.4
  flutter_svg: ^2.0.10

  cupertino_icons: ^1.0.8

  # 定位
  geolocator: ^13.0.1
  # HTTP
  dio: ^5.7.0
  # 權限
  permission_handler: ^11.3.1
  # SQLite
  sqflite: ^2.4.2+1
  path: ^1.9.0

  # 圖片選取（相機 / 相簿）
  image_picker: ^1.1.2
  # 本地端免費 OCR（不需要 API 金鑰）
  google_mlkit_text_recognition: ^0.13.1

  # 加速度計（支付畫面傾斜翻轉）
  sensors_plus: ^4.0.0
  # 亮度控制（支付畫面自動最亮）
  screen_brightness: ^0.2.2+1

  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/brand_name.db
    - lib/assets/brand_name.sql
    - lib/assets/Payment/reward_rules.sql
    - lib/assets/Payment/discount_rules.sql
    - lib/assets/Payment/rule_store_map.sql
    - lib/assets/Payment/stores.sql
    - lib/assets/Payment/payment_options.sql
    - lib/assets/images/7-11.png
    - lib/assets/images/fm.png
    - lib/assets/images/hl.png
    - lib/assets/images/ok.png
    - lib/assets/members/會員.sql
    - lib/assets/payment/支付方式.sql
    - lib/assets/payment/等級.sql
