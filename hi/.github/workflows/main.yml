name: iOS_Build

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env from secret
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Build
        run: |
          # 解決 Podfile 找不到 Flutter 方法的核心修復
          sed -i '' "1i\\
          require File.expand_path(File.join(ENV['FLUTTER_ROOT'], 'packages', 'flutter_tools', 'bin', 'podhelper'))\\
          " ios/Podfile

          rm -rf android/
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: App.ipa
