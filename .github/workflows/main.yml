name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    # 指定工作目錄為 hi 資料夾
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 1. 停用 SPM 以解決部分 Plugin 不支援的問題，強制使用 CocoaPods
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter Pub Get
        run: flutter pub get

      # 2. 重要：偵錯資產路徑 (如果 build 失敗，請看此步驟的 Log)
      # 這會幫你確認 brand_name.sql 到底在哪裡
      - name: Debug Assets Check
        run: |
          echo "--- 檢查當前目錄結構 ---"
          pwd
          echo "--- 檢查 assets 資料夾內容 ---"
          ls -R assets || echo "找不到 assets 資料夾"
          echo "--- 檢查 pubspec.yaml 中的 assets 設定 ---"
          grep -A 10 "assets:" pubspec.yaml || echo "pubspec.yaml 中沒看到 assets 設定"

      # 3. 注入虛擬 Team ID 並強制關閉 Xcode 簽署檢查
      - name: Configure Xcode Build Settings
        run: |
          mkdir -p ios/Flutter
          echo "DEVELOPMENT_TEAM=5B97512345" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig

      # 4. 執行 iOS 編譯
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 5. 打包成未簽署的 IPA
      - name: Package IPA
        run: |
          mkdir -p Payload
          # 將編譯出的 .app 複製到 Payload 資料夾
          cp -r build/ios/iphoneos/Runner.app Payload/
          # 壓縮成 ipa
          zip -r App.ipa Payload/

      # 6. 上傳成品
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          # 因為工作目錄在 hi，所以路徑是 hi/App.ipa
          path: hi/App.ipa
