name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter Pub Get
        run: flutter pub get

      # --- 核心自動化修正：自動建立所有缺失的 assets 檔案 ---
      - name: Auto-fix All Missing Assets
        run: |
          echo "正在自動檢查 pubspec.yaml 中定義的所有資產..."
          # 透過 python 或簡單的 grep 抓取 pubspec.yaml 中的資產路徑
          # 排除資料夾宣告，只針對具體的檔案路徑
          ASSETS=$(grep -E '^\s+-\s+\S+\.' pubspec.yaml | sed 's/.*-\s*//' | sed 's/[[:space:]]*$//')
          
          for ASSET in $ASSETS; do
            if [ ! -f "$ASSET" ]; then
              echo "找不到資產: $ASSET ，正在自動建立..."
              mkdir -p "$(dirname "$ASSET")"
              touch "$ASSET"
            else
              echo "資產已存在: $ASSET"
            fi
          done

      - name: Configure Xcode Build Settings
        run: |
          mkdir -p ios/Flutter
          echo "DEVELOPMENT_TEAM=5B97512345" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: hi/App.ipa
