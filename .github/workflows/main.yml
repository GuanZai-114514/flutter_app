name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 解決問題 1: 停用 SPM 整合，改回使用 CocoaPods (解決套件不支援 SPM 的警告)
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter Pub Get
        run: flutter pub get

      # 解決問題 2: 注入虛擬 Team ID 並強制關閉簽署 (解決 Xcode 報錯)
      # 我們直接修改 Release.xcconfig 檔案，這是最穩定的做法
      - name: Configure Xcode Build Settings
        run: |
          echo "DEVELOPMENT_TEAM=5B97512345" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS
        # 使用 --no-codesign 配合上面注入的設定
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir Payload
          # 確保路徑正確，Flutter build 產出的路徑通常如下
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: hi/App.ipa
