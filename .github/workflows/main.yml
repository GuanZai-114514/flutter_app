name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter Pub Get
        run: flutter pub get

      # --- 關鍵修正步驟：強制確保資產檔案存在 ---
      - name: Ensure Assets Exist
        run: |
          echo "正在檢查並強制建立缺失的資產檔案..."
          mkdir -p assets
          # 如果檔案不存在，建立一個空的 sql 檔案，避免編譯失敗
          if [ ! -f "assets/brand_name.sql" ]; then
            echo "警告：找不到 assets/brand_name.sql，正在建立空檔案以繞過編譯錯誤。"
            touch assets/brand_name.sql
          fi
          # 同理處理之前噴錯的另一個檔案
          mkdir -p lib/Payment
          if [ ! -f "lib/Payment/stores.sql" ]; then
            touch lib/Payment/stores.sql
          fi

      - name: Configure Xcode Build Settings
        run: |
          mkdir -p ios/Flutter
          echo "DEVELOPMENT_TEAM=5B97512345" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: hi/App.ipa
