name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env from secret
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter pub get
        run: flutter pub get

      - name: Fix Podfile if needed
        run: |
          PODFILE="ios/Podfile"
          FLUTTER_LINE="require File.expand_path(File.join(ENV['FLUTTER_ROOT'], 'packages', 'flutter_tools', 'bin', 'podhelper'))"
          # 只在不存在該行時才插入，避免重複
          if ! grep -qF "podhelper" "$PODFILE"; then
            sed -i.bak "1s/^/${FLUTTER_LINE}\n/" "$PODFILE"
          fi
        # ↑ 先執行這步，ios/Podfile 才會存在

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: App.ipa
