name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    # 指定工作目錄，這樣下面所有指令都會在 hi 資料夾內執行
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS
        # 這裡會自動處理 pod install
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          # 注意：因為工作目錄設定在 hi，產出的檔案會在 hi/App.ipa
          path: hi/App.ipa
