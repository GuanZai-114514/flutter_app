name: iOS_Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hi

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Fix Missing Flutter Files
        # 這一步最重要：如果你的倉庫沒上傳 podhelper.rb，我們從 SDK 裡強制複製一份過去
        run: |
          mkdir -p ios/Flutter
          cp "$FLUTTER_HOME/packages/flutter_tools/bin/podhelper.rb" ios/Flutter/
          echo "FLUTTER_ROOT=$FLUTTER_HOME" > ios/Flutter/Generated.xcconfig

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS
        # 強制指定 FLUTTER_ROOT 環境變數供 Podfile 使用
        run: flutter build ios --release --no-codesign
        env:
          FLUTTER_ROOT: ${{ env.FLUTTER_HOME }}

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r App.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: hi/App.ipa
